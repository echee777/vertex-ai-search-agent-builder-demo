steps:
  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/vertexai-search-demo", "."]

  # Step 2: Push the Docker image to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/vertexai-search-demo"]

  # Step 3: Deploy the Docker image to Google Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args: [
        "run",
        "deploy",
        "vertexai-search-demo",
        "--image",
        "gcr.io/$PROJECT_ID/vertexai-search-demo",
        "--port",
        "8000",
        "--platform",
        "managed",
        "--region",
        "us-central1", # Replace with your desired region
        "--allow-unauthenticated",
        "--set-env-vars",
        "PROJECT_ID=agents-499722,LOCATION=global,DATASTORE_ID=edwardchee-agents-research-medical_1781743158807,AGENT_APPLICATION_ID=edwardchee-agents-research_1781743663240,BUCKET_NAME=edwardchee-agents",
      ]

images:
  - "gcr.io/$PROJECT_ID/vertexai-search-demo"

options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
  logging: CLOUD_LOGGING_ONLY
